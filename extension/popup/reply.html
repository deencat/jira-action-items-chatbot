<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reply to Reminder</title>
  <link rel="stylesheet" href="../styles/popup.css" />
</head>
<body>
  <main class="reply">
    <h1>Reply to Reminder</h1>
    <p id="issue-label">Issue: unknown</p>
    <textarea id="reply-message" rows="6" placeholder="Type your update, e.g. done, snooze 2 days, or add comment..."></textarea>
    <div class="actions">
      <button id="send-reply-btn" type="button">Send Reply</button>
    </div>
    <p id="reply-status">Ready.</p>
  </main>

  <script src="reply.js"></script>
</body>
</html>
