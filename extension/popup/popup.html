<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jira Action Items Chatbot</title>
  <link rel="stylesheet" href="../styles/popup.css" />
</head>
<body>
  <main class="popup">
    <header class="popup-header">
      <h1>Jira Action Items</h1>
      <p id="auth-status" class="status">Checking auth status...</p>
    </header>

    <section class="actions">
      <button id="login-btn" type="button">Login</button>
      <button id="logout-btn" type="button">Logout</button>
      <button id="check-reminders-btn" type="button">Check Reminders</button>
    </section>

    <section class="context">
      <h2>Current Jira Context</h2>
      <pre id="jira-context">No Jira page context captured yet.</pre>
    </section>

    <section class="request-form">
      <h2>Manual API Request</h2>
      <label for="endpoint">Endpoint</label>
      <input id="endpoint" type="text" value="/api/settings" />
      <label for="method">Method</label>
      <select id="method">
        <option value="GET">GET</option>
        <option value="POST">POST</option>
      </select>
      <label for="payload">JSON payload (POST only)</label>
      <textarea id="payload" rows="6" placeholder='{"issue_key":"PROJ-123"}'></textarea>
      <button id="send-request-btn" type="button">Send Request</button>
    </section>

    <section class="result">
      <h2>Response</h2>
      <pre id="result">Ready.</pre>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
